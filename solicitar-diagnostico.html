<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedDigital</title>
<style>
  :root{
    --navy:#0B2545; --mid:#1A5276; --gold:#C8A96E; --off:#F7F8FA; --graph:#1C1C1E;
    --border:#E4E8EF; --ice:#E8EDF5; --goldsoft:#F5EEDC; --line:#C7CDD6;
    --serif:Georgia,'Times New Roman',serif; --sans:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:var(--sans);color:var(--graph);background:var(--off);line-height:1.55}
  #bar{position:fixed;top:0;left:0;height:4px;width:0;background:var(--gold);z-index:20;transition:width .3s ease}
  header{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(247,248,250,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);z-index:15}
  .brand{display:flex;align-items:center;gap:8px}
  .brand svg{width:26px;height:26px}
  .brand .w{font-family:var(--serif);font-size:1.05rem;color:var(--navy)}
  .brand .w b{color:var(--gold)}
  #back{border:0;background:none;color:var(--mid);font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:4px;padding:8px;visibility:hidden}
  main{max-width:640px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:90px 22px 40px}
  .step{animation:in .35s ease}
  @keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .eyebrow{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
  .code{display:inline-block;background:var(--navy);color:#fff;font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:6px;margin-bottom:12px;letter-spacing:.04em}
  h1.q{font-family:var(--serif);font-weight:700;color:var(--navy);font-size:clamp(1.4rem,5.2vw,2rem);margin:0 0 6px;line-height:1.22}
  .hint{background:var(--goldsoft);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:12px 14px;margin:16px 0;font-size:.86rem;color:#5A4A2A}
  .hint b{display:block;color:#7A5E2E;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .hint span{display:block;margin:3px 0;font-style:italic}
  textarea,input[type=text],input[type=email],input[type=tel]{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:14px;font-family:var(--sans);font-size:1.05rem;color:var(--graph);background:#fff;resize:vertical;margin-top:8px}
  textarea{min-height:120px}
  textarea:focus,input:focus{outline:none;border-color:var(--mid);box-shadow:0 0 0 3px rgba(26,82,118,.12)}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);background:#fff;border-radius:12px;padding:14px 16px;font-size:1rem;cursor:pointer;transition:border-color .15s,background .15s;text-align:left}
  .opt:hover{border-color:var(--mid)}
  .opt.sel{border-color:var(--gold);background:var(--goldsoft)}
  .opt .dot{flex:0 0 20px;width:20px;height:20px;border-radius:50%;border:2px solid var(--mid);position:relative}
  .opt.sel .dot{border-color:var(--gold)}
  .opt.sel .dot::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--gold)}
  .opt .dot.sq{border-radius:5px}
  .opt.sel .dot.sq::after{border-radius:2px}
  .multi-tip{color:#8A93A0;font-size:.85rem;margin:2px 0 6px}
  .row{display:flex;align-items:center;gap:14px;margin-top:26px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:0;cursor:pointer;font-weight:700;font-size:1rem;padding:13px 26px;border-radius:11px;font-family:var(--sans)}
  .btn-gold{background:var(--gold);color:var(--navy)}
  .btn-gold:active{transform:translateY(1px)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-ghost{background:none;color:var(--mid);font-weight:600;padding:13px 6px}
  .center{text-align:center}
  .logo-big{margin-bottom:18px}
  .logo-big svg{width:64px;height:64px}
  .lead{color:#46505e;font-size:1.05rem;margin:14px 0 4px}
  .meta{font-size:.85rem;color:#8A93A0;margin-top:10px}
  .review{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;max-height:42vh;overflow:auto;white-space:pre-wrap;font-size:.82rem;color:#37414f;margin:18px 0;line-height:1.5}
  .send-col{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .send-col .btn{justify-content:center;width:100%}
  .small{font-size:.8rem;color:#8A93A0;margin-top:12px;text-align:center}
  .ok{font-size:3rem}
</style>
</head>
<body>
<div id="bar"></div>
<header>
  <span class="brand" aria-label="MedDigital">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="14" y="8" width="52" height="40" rx="7" fill="none" stroke="#0B2545" stroke-width="4"/>
      <rect x="32" y="48" width="16" height="7" rx="2" fill="#0B2545"/><rect x="23" y="55" width="34" height="4.5" rx="2.3" fill="#0B2545"/>
      <path d="M18 29 L24 29 L28 17 L33 47 L38 5 L43 29 L49 29 L57 29" fill="none" stroke="#C8A96E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="w">Med<b>Digital</b></span>
  </span>
  <button id="back" onclick="prev()">‹ Voltar</button>
</header>
<main id="stage"></main>

<script>
/* ===CONFIG=== */
const EMAIL = "meddigitalbr@gmail.com";
const FORMSPREE_ENDPOINT = ""; // cole aqui o endpoint do Formspree para receber direto no e-mail
const FORM_TITLE   = "Diagnóstico Digital Gratuito";
const SUMMARY_HEAD = "SOLICITAÇÃO DE DIAGNÓSTICO — MEDDIGITAL";
const WELCOME_EYE  = "Diagnóstico digital gratuito";
const WELCOME_H1   = "Receba uma análise da sua presença digital";
const WELCOME_LEAD = "São poucas perguntas. Nossa equipe analisa o mercado da sua especialidade na sua cidade e devolve um diagnóstico — sem compromisso.";
const WELCOME_META = "Leva cerca de 2 minutos · Sem compromisso";
const END_LEAD     = "Revise e envie. Em breve nossa equipe entra em contato com o seu diagnóstico.";
/* ===END CONFIG=== */

const BLOCKS = {
 A:"Identidade e Posicionamento", B:"Trajetória e Diferenciais", C:"Pacientes e Mercado",
 D:"Site e Presença Digital", E:"Imagem e Conteúdo", F:"Investimento",
 G:"Conteúdo e Comunicação", H:"Visão e Objetivos"
};

const Q = [
 {id:"nome", type:"text", req:true, q:"Para começar, qual é o seu nome?", ph:"Dr.(a) Nome Completo"},
 {id:"esp", type:"text", req:true, q:"Qual é a sua especialidade?", ph:"Ex.: Cardiologia, Ortopedia…"},
 {id:"cidade", type:"text", req:true, q:"Em qual cidade você atende?", ph:"Cidade – Estado"},
 {id:"site", type:"text", q:"Você já tem site? Se sim, qual é o endereço?", hint:["Sim: www.[seusite].com.br","Não tenho ainda"]},
 {id:"objetivo", type:"choice", multi:true, q:"O que você mais quer alcançar agora?", op:["Atrair mais pacientes particulares","Ter um site profissional e confiável","Aparecer no Google na minha cidade","Organizar e crescer minhas redes sociais","Outro"]},
 {id:"contato", type:"text", req:true, q:"Qual o melhor WhatsApp ou e-mail para retornarmos?", ph:"WhatsApp ou e-mail"},
 {id:"obs", type:"text", q:"Quer nos contar mais alguma coisa? (opcional)", ph:"Opcional"},
];

/* ===ENGINE=== */
const answers = {};
let i = -1;
const stage = document.getElementById('stage');
const bar = document.getElementById('bar');
const back = document.getElementById('back');
document.title = FORM_TITLE + " — MedDigital";

function logoBig(){return `<div class="logo-big"><svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <rect x="14" y="8" width="52" height="40" rx="7" fill="none" stroke="#0B2545" stroke-width="4"/>
  <rect x="32" y="48" width="16" height="7" rx="2" fill="#0B2545"/><rect x="23" y="55" width="34" height="4.5" rx="2.3" fill="#0B2545"/>
  <path d="M18 29 L24 29 L28 17 L33 47 L38 5 L43 29 L49 29 L57 29" fill="none" stroke="#C8A96E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;}

function render(){
  back.style.visibility = i>0 ? 'visible':'hidden';
  const total = Q.length;
  if(i<0){ bar.style.width='0'; renderWelcome(); return; }
  if(i>=total){ bar.style.width='100%'; renderEnd(); return; }
  bar.style.width = ((i)/total*100)+'%';
  const q = Q[i];
  let h = `<div class="step">`;
  if(q.blk) h += `<div class="eyebrow">Bloco ${q.blk} · ${BLOCKS[q.blk]}</div>`;
  if(q.code) h += `<span class="code">${q.code}</span>`;
  h += `<h1 class="q">${q.q}</h1>`;
  if(q.type==='choice' && q.multi) h += `<p class="multi-tip">Pode marcar mais de uma opção</p>`;
  if(q.type==='text'){
    if(q.hint){ h+=`<div class="hint"><b>Exemplos</b>`; q.hint.forEach(x=>h+=`<span>› ${x}</span>`); h+=`</div>`; }
    const val = answers[q.id]||'';
    h += `<textarea id="inp" placeholder="${q.ph||'Escreva aqui…'}">${val}</textarea>`;
    h += `<div class="row"><button class="btn btn-gold" onclick="next()">Continuar</button>`;
    if(!q.req) h += `<button class="btn btn-ghost" onclick="skip()">Pular</button>`;
    h += `</div>`;
  } else {
    const cur = answers[q.id];
    const isSel = (o)=> q.multi ? (Array.isArray(cur)&&cur.includes(o)) : cur===o;
    h += `<div class="opts">`;
    q.op.forEach((o,idx)=>{ const sel = isSel(o)?' sel':''; const sq = q.multi?' sq':''; h+=`<button class="opt${sel}" onclick="pick('${q.id}',${idx})"><span class="dot${sq}"></span><span>${o}</span></button>`; });
    h += `</div>`;
    if(q.multi){ h += `<div class="row"><button class="btn btn-gold" onclick="next()">Continuar</button>`; if(!q.req) h += `<button class="btn btn-ghost" onclick="skip()">Pular</button>`; h += `</div>`; }
  }
  h += `</div>`;
  stage.innerHTML = h;
  const inp = document.getElementById('inp'); if(inp){ inp.focus(); }
}

function renderWelcome(){
  stage.innerHTML = `<div class="step center">${logoBig()}
    <div class="eyebrow">${WELCOME_EYE}</div>
    <h1 class="q" style="margin-top:8px">${WELCOME_H1}</h1>
    <p class="lead">${WELCOME_LEAD}</p>
    <div class="row" style="justify-content:center"><button class="btn btn-gold" onclick="next()">Começar →</button></div>
    <p class="meta">${WELCOME_META}</p></div>`;
}

function renderEnd(){
  const txt = buildSummary();
  const nome = (answers['nome']||'Médico(a)').trim();
  stage.innerHTML = `<div class="step center">
    <div class="ok">✓</div>
    <h1 class="q" style="margin-top:6px">Tudo pronto, ${escapeHtml(nome.split(' ')[0])||''}!</h1>
    <p class="lead">${END_LEAD}</p>
    <textarea class="review" id="rev" readonly>${escapeHtml(txt)}</textarea>
    <div class="send-col">
      <button class="btn btn-gold" onclick="sendIt()">Enviar para a MedDigital</button>
      <button class="btn btn-navy" onclick="copyIt()">Copiar respostas</button>
      <button class="btn btn-ghost" onclick="downloadIt()">Baixar como arquivo (.txt)</button>
    </div>
    <p class="small">As respostas vão para <b>${EMAIL}</b>. Se o app de e-mail abrir cortado, toque em <b>Copiar respostas</b> e cole no e-mail.</p></div>`;
}

function pick(id, idx){
  const q = Q.find(x=>x.id===id); const val = q.op[idx];
  if(q.multi){ let arr = Array.isArray(answers[id])?answers[id].slice():[]; const k=arr.indexOf(val); if(k>=0) arr.splice(k,1); else arr.push(val); answers[id]=arr; render(); }
  else { answers[id]=val; render(); setTimeout(next, 220); }
}
function saveText(){ const inp=document.getElementById('inp'); if(inp){ const q=Q[i]; answers[q.id]=inp.value.trim(); } }
function next(){ if(i>=0 && i<Q.length){ const q=Q[i]; if(q.type==='text'){ saveText(); if(q.req && !answers[q.id]){ document.getElementById('inp').focus(); return; } } } i++; render(); window.scrollTo(0,0); }
function skip(){ answers[Q[i].id]=''; i++; render(); window.scrollTo(0,0); }
function prev(){ if(i>=0){ if(i<Q.length && Q[i] && Q[i].type==='text') saveText(); i--; render(); window.scrollTo(0,0); } }
document.addEventListener('keydown',e=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ if(i>=0&&i<Q.length){ next(); } } });

function buildSummary(){
  const d = new Date();
  let s = SUMMARY_HEAD + "\n";
  s += "Médico(a): " + (answers['nome']||'—') + "\n";
  if(answers['contato']!==undefined) s += "Contato: " + (answers['contato']||'—') + "\n";
  s += "Data: " + d.toLocaleDateString('pt-BR') + " " + d.toLocaleTimeString('pt-BR') + "\n";
  s += "=".repeat(48) + "\n";
  let curBlk=null;
  Q.forEach(q=>{
    if(q.id==='nome'||q.id==='contato') return;
    let a = answers[q.id]; if(Array.isArray(a)) a = a.join('; ');
    if(q.blk){
      if(q.blk!==curBlk){ curBlk=q.blk; s += "\nBLOCO " + q.blk + " — " + BLOCKS[q.blk].toUpperCase() + "\n"; }
      s += "\n" + q.code + ". " + q.q + "\n→ " + (a && a.length ? a : "(não respondido)") + "\n";
    } else {
      s += "\n• " + q.q + "\n→ " + (a && a.length ? a : "(não respondido)") + "\n";
    }
  });
  s += "\n" + "=".repeat(48) + "\nGerado pelo formulário digital MedDigital.";
  return s;
}

function escapeHtml(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyIt(){ const t=buildSummary(); navigator.clipboard.writeText(t).then(()=>flash("Respostas copiadas!")).catch(()=>{ const r=document.getElementById('rev'); r.focus(); r.select(); flash("Selecionado — copie pelo teclado"); }); }
function downloadIt(){ const t=buildSummary(); const nome=(answers['nome']||'medico').replace(/[^a-zA-Z0-9]+/g,'_'); const blob=new Blob([t],{type:'text/plain;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download="MedDigital_"+nome+".txt"; a.click(); URL.revokeObjectURL(url); }
async function sendIt(){
  const t=buildSummary(); const nome=answers['nome']||'Médico'; const subject=FORM_TITLE+" — "+nome;
  if(FORMSPREE_ENDPOINT){
    try{ const r=await fetch(FORMSPREE_ENDPOINT,{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/json'},body:JSON.stringify({nome:answers['nome'],contato:answers['contato']||'',respostas:t,_subject:subject})});
      if(r.ok){ stage.innerHTML=`<div class="step center"><div class="ok">✓</div><h1 class="q">Recebido!</h1><p class="lead">A equipe MedDigital recebeu suas respostas. Em breve entramos em contato.</p></div>`; return; } }catch(e){}
  }
  window.location.href = "mailto:"+EMAIL+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(t);
}
function flash(msg){ const e=document.createElement('div'); e.textContent=msg; e.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0B2545;color:#fff;padding:11px 20px;border-radius:10px;font-size:.9rem;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)"; document.body.appendChild(e); setTimeout(()=>e.remove(),1900); }

render();
</script>
</body>
</html>
